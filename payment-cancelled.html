<!DOCTYPE html>
<html lang="en">
<head>
    <title>Checkout Cancelled | Synexis Peptides</title>
    <meta name="description" content="Synexis Peptides supplies research-grade peptides for Australian customers. Fast dispatch, secure checkout, and clear research-use information.">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .status-container {
            max-width: 600px;
            margin: 60px auto 100px;
            padding: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            text-align: center;
        }
        .status-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(234, 179, 8, 0.1);
            color: #eab308;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 24px;
            border: 2px solid #eab308;
        }
        .status-title {
            font-size: 32px;
            color: var(--text-white);
            margin-bottom: 12px;
        }
        .status-desc {
            color: var(--text-light);
            font-size: 16px;
            margin-bottom: 32px;
        }
        .action-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .btn-primary {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            padding: 14px 28px;
            font-weight: 600;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }
        .btn-primary:hover {
            background: var(--primary-light);
        }
        .btn-secondary {
            display: inline-block;
            background: transparent;
            color: var(--text-white);
            padding: 14px 28px;
            font-weight: 600;
            border: 1px solid var(--border-hover);
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>
    <nav class="navbar" style="justify-content: center; padding: 20px;">
        <div class="logo">
            <a href="index.html"><img src="Photos/logo.png" alt="Synexis Peptides" class="nav-logo"></a>
        </div>
    </nav>

    <div class="status-container">
        <div class="status-icon">
            <i class="fas fa-shopping-cart"></i>
        </div>
        <h1 class="status-title">Checkout Cancelled</h1>
        <p class="status-desc">Your checkout session was cancelled. No payment was processed. Your cart items are still saved if you'd like to try again.</p>
        
        <div class="action-buttons">
            <a href="checkout.html" class="btn-primary">Return to Checkout</a>
            <a href="index.html" class="btn-secondary">Keep Shopping</a>
        </div>
    </div>
</body>
</html>
